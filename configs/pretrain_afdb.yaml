# Stage 1: AFDB pretraining - learn general protein geometry
run_name: pt_tmp

model:
  d_token: 512
  d_pair: 128
  d_atom: 128
  d_cond: 512
  n_trunk: 12
  n_atom_layers: 3
  n_heads: 8

training:
  batch_size: 6
  max_steps: 1000000
  lr: 1.0e-4
  warmup_steps: 5000
  weight_decay: 0.01
  grad_clip: 1.0
  seq_loss_weight: 1.0
  bond_loss_weight: 0.0
  bf16: true
  seed: 42

data:
  data_dir: data/processed/afdbs
  ec_vectors_path: weights/ec_vectors_train.pt
  num_workers: 4

logging:
  log_every: 200
  ckpt_every: 5000
  max_ckpts: 5
  milestone_every: 50000
  wandb: true
  wandb_project: enzflow
